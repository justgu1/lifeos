[project]
name = "lifeos-shared"
version = "0.1.0"
description = "LifeOS shared event contract — pydantic models generated from JSON Schema"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.9"]

[project.optional-dependencies]
dev = ["pytest>=8.3", "datamodel-code-generator>=0.26"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lifeos_shared"]
