[project]
name = "lifeos-domain"
version = "0.1.0"
description = "LifeOS pure domain — aggregates, events, services (framework-free)"
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "ruff>=0.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lifeos_domain"]
