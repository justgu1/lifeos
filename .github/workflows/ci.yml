name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api:
    name: api (lint + unit + import-linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Sync workspace
        run: uv sync --all-packages
      - name: Lint
        run: uv run ruff check .
      - name: Import boundaries (domain is framework-free)
        run: uv run lint-imports
      - name: Unit tests
        run: uv run pytest apps/api packages/domain

  web:
    name: web (lint + unit + e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Codegen (shared event schema)
        run: pnpm codegen
      - name: Lint
        run: pnpm --filter @lifeos/web lint
      - name: Unit tests
        run: pnpm --filter @lifeos/web test
      - name: E2E tests
        run: pnpm --filter @lifeos/web e2e
