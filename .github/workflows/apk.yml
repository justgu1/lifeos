name: apk

# Deferred gate (ADR-006). The Android project does not exist yet, so this
# workflow is manual-only until PLATFORM-004 scaffolds the Capacitor Android
# shell (@capacitor/android + `cap add android`). Once that lands, this becomes
# a required, containerized per-PR gate that runs `gradlew assembleDebug`.
on:
  workflow_dispatch:

jobs:
  build-apk:
    name: build android apk (capacitor) — deferred until PLATFORM-004
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Build web bundle
        run: pnpm --filter @lifeos/web build
      - name: Android build (activated in PLATFORM-004)
        run: |
          if [ -d apps/web/android ]; then
            echo "android project present — native APK build runs in PLATFORM-004"
          else
            echo "no android project yet; APK gate is deferred to PLATFORM-004"
          fi
